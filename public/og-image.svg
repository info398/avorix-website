<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f0f"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a1a2e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Indigo accent bar left -->
  <rect x="0" y="0" width="6" height="630" fill="#6366f1"/>

  <!-- Indigo glow top-right -->
  <ellipse cx="1050" cy="150" rx="300" ry="200" fill="#6366f1" opacity="0.08"/>

  <!-- Logo area -->
  <text x="80" y="120" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="48" fill="#f5f5f5">Avorix</text>

  <!-- Tagline -->
  <text x="80" y="290" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="56" fill="#f5f5f5">Qualität ohne</text>
  <text x="80" y="360" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="56" fill="#f5f5f5">Fachkräfte-Abhängigkeit.</text>

  <!-- Sub text -->
  <text x="80" y="440" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="28" fill="#9a9a9a">Hotels &amp; Gastronomie · Koch App · Standardisierte Prozesse</text>

  <!-- Bottom accent line -->
  <rect x="80" y="520" width="120" height="4" fill="#6366f1" rx="2"/>

  <!-- Domain -->
  <text x="80" y="570" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="24" fill="#6366f1">avorix.cloud</text>
</svg>
